name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff
        run: uv run ruff check src/ solver.py tests/

      - name: Pylint
        run: uv run pylint src/ solver.py tests/

      - name: Tests
        run: uv run pytest tests/ -v
